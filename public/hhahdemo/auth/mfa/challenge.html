<!DOCTYPE html>
<html lang="en">

  <style>
    :root {
      --c-bg:        #f8fafc;
      --c-panel:     #ffffff;
      --c-border:    #e2e8f0;
      --c-text:      #0f172a;
      --c-text-dim:  #64748b;
      --c-brand:     #2563eb;

      --c-success:   #16a34a;

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; color: var(--c-text); background: var(--c-bg); }

<body class="min-h-screen"><div style="position:fixed;top:0;left:0;right:0;background:#1e40af;color:white;text-align:center;font-size:12px;padding:6px;z-index:100;font-family:system-ui">&#127916; HHAH Portal Demo &middot; click around to explore &middot; forms are read-only</div>
  
<div class="min-h-screen flex flex-col">
  <div class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="text-xl font-semibold text-slate-900">Sunrise Home Health</div>
        <div class="text-[10px] tracking-[0.25em] uppercase text-slate-400 mt-1">on Eonexea</div>
      </div>
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        
<h1 class="text-lg font-semibold text-slate-900">Verify it's you</h1>
<p class="text-sm text-slate-500 mt-1">Enter the 6-digit code from your authenticator app.</p>



<form action="/hhahdemo/" method="get" method="post" class="mt-6 space-y-4">
  <input id="code" name="code" type="text" inputmode="numeric" autocomplete="one-time-code"
         pattern="[0-9]{6}" maxlength="6" required autofocus
         class="w-full px-3 py-3 text-center font-mono text-2xl tracking-widest border border-slate-200 rounded-md
                focus:outline-none focus:ring-2 focus:ring-blue-500">
  <button type="submit"
          class="w-full px-4 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700">
    Verify
  </button>
</form>

<div class="mt-6 pt-6 border-t border-slate-200 text-xs text-center text-slate-500">
  Use a recovery code instead (coming soon)
</div>

      <div class="text-center mt-6 text-xs text-slate-500 space-x-3">
